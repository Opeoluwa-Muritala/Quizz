<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}Mainstreet Exam Portal{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Themify Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lykmapipo/themify-icons@0.1.2/css/themify-icons.css">
    <!-- Tabler Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <!-- Shared Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v='20260610-1208') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <main class="app-container">
        {% block content %}{% endblock %}
    </main>

    <!-- Shared Javascript -->
    <script src="{{ url_for('static', filename='app.js', v='20260610-1208') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
